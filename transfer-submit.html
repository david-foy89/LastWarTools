<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Submit Alliance Transfer Info</title>
    <meta
      name="description"
      content="Submit your alliance transfer information via a unique link."
    />
    <link rel="stylesheet" href="last-war-furnace-upgrade-calculator.css" />
      <!-- Firebase App (modular SDK) -->
      <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
          apiKey: "AIzaSyDow8S7fv4cwDxXVzWzqOUa9G8swBC0jNI",
          authDomain: "lastwartools-c12c8.firebaseapp.com",
          projectId: "lastwartools-c12c8",
          storageBucket: "lastwartools-c12c8.firebasestorage.app",
          messagingSenderId: "536808421567",
          appId: "1:536808421567:web:fae01f7b3852176a7aae0a",
          measurementId: "G-34RS45FLKS"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window._firebaseDb = db;
        window._firebaseDoc = doc;
        window._firebaseSetDoc = setDoc;
      </script>
  </head>
  <body>
    <div class="page">
      <section class="hero">
        <h1>Alliance Transfer Submission</h1>
        <div class="sub">
          Fill out your transfer info. When submitted, it will be sent to the
          requesting user.
        </div>
      </section>
      <section class="layout" style="display: block; padding: 0">
        <form
          id="transferSubmitForm"
          style="
            max-width: 700px;
            margin: 0 auto;
            background: linear-gradient(
              180deg,
              var(--panel) 0%,
              var(--panel-2) 100%
            );
            border: 1px solid var(--line-soft);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            padding: 18px 14px 14px 14px;
          "
        >
          <div class="field">
            <label
              >Display Name (Please use the same name)<input
                name="displayName"
                required
            /></label>
          </div>
          <div class="field">
            <label>Server Number<input name="serverNumber" required /></label>
          </div>
          <div class="field">
            <label
              >Current Alliance Name<input name="currentAlliance" required
            /></label>
          </div>
          <div class="field">
            <label
              >Best Squad Power with optimized setup (Ex: 23.6m)<input
                name="bestSquadPower"
                required
            /></label>
          </div>
          <div class="field">
            <label
              >Total Hero Power (Ex: 105.6 million)<input
                name="totalHeroPower"
                required
            /></label>
          </div>
          <div class="field">
            <label
              >Which Alliance are you interested in joining?<input
                name="allianceInterested"
                required
            /></label>
          </div>
          <div class="field">
            <label
              >If known, what is your transfer status?
              <select name="transferStatus">
                <option value="">-- Select Status --</option>
                <option value="Gold">Gold</option>
                <option value="Purple">Purple</option>
                <option value="Blue">Blue</option>
                <option value="White">White</option>
              </select>
            </label>
          </div>
          <div class="field">
            <label
              >Additional Info you want considered?
              <textarea
                id="additionalInfo"
                name="additionalInfo"
                style="
                  min-height: 120px;
                  width: 100%;
                  resize: vertical;
                  padding: 11px 12px;
                  border: 1px solid var(--line);
                  border-radius: 10px;
                  background: #0c1825;
                  color: var(--text);
                  font-size: 0.98rem;
                  transition:
                    border-color 140ms ease,
                    box-shadow 140ms ease,
                    background-color 140ms ease;
                "
              ></textarea>
            </label>
          </div>
          <button type="submit" class="action-button">
            Submit Transfer Info
          </button>
          <div id="submitResult" style="margin-top: 14px"></div>
        </form>
      </section>
    </div>
    <script>
      // Get the unique id from the URL
      function getId() {
        const params = new URLSearchParams(window.location.search);
        return params.get("id");
      }
      document
        .getElementById("transferSubmitForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();
          const id = getId();
          if (!id) {
            document.getElementById("submitResult").textContent =
              "Invalid or missing link ID.";
            return;
          }
          const data = {
            displayName: this.displayName.value,
            serverNumber: this.serverNumber.value,
            currentAlliance: this.currentAlliance.value,
            bestSquadPower: this.bestSquadPower.value,
            totalHeroPower: this.totalHeroPower.value,
            allianceInterested: this.allianceInterested.value,
            transferStatus: this.transferStatus.value,
            submittedAt: new Date().toISOString(),
            linkId: id,
            additionalInfo: this.additionalInfo.value,
          };
          try {
            // Wait for the modular SDK to be loaded
            const waitForFirebase = () => new Promise((resolve) => {
              if (window._firebaseDb && window._firebaseDoc && window._firebaseSetDoc) resolve();
              else setTimeout(() => resolve(waitForFirebase()), 50);
            });
            await waitForFirebase();
            const db = window._firebaseDb;
            const doc = window._firebaseDoc;
            const setDoc = window._firebaseSetDoc;
            await setDoc(doc(db, 'transferSubmissions', id), data);
            // Optionally save to localStorage for user reference
            localStorage.setItem(
              "transferSubmission_" + id,
              JSON.stringify(data),
            );
            document.getElementById('submitResult').innerHTML = '<span style="color:var(--ok);font-weight:700;">Thank you! Your info has been submitted and will appear in the tracker.</span>';
            this.reset();
          } catch (err) {
            document.getElementById('submitResult').innerHTML = '<span style="color:var(--warn);font-weight:700;">Error submitting info. Please try again later.</span>';
          }
        });
    </script>
  </body>
</html>
