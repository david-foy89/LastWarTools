<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Submit Alliance Transfer Info</title>
    <meta
      name="description"
      content="Submit your alliance transfer information via a unique link."
    />
    <link rel="stylesheet" href="last-war-furnace-upgrade-calculator.css" />
    <script>
      if (location.hostname === "localhost" || location.hostname === "127.0.0.1") {
        self.FIREBASE_APPCHECK_DEBUG_TOKEN = true;
      }
    </script>
    <script src="firebase-config.example.js"></script>
    <script src="firebase-config.js"></script>
  </head>
  <body>
    <div class="page">
      <div
        id="firebaseConfigBanner"
        style="
          display: none;
          margin: 0 0 16px;
          padding: 12px 14px;
          border-radius: 10px;
          border: 1px solid var(--warn);
          background: rgba(255, 180, 80, 0.12);
          color: var(--text);
          font-size: 0.95rem;
        "
      ></div>
      <section class="hero">
        <h1>Alliance Transfer Submission</h1>
        <div class="sub">
          Fill out your transfer info. When submitted, it will be sent to the
          requesting user.
        </div>
      </section>
      <section class="layout" style="display: block; padding: 0">
        <form
          id="transferSubmitForm"
          style="
            max-width: 700px;
            margin: 0 auto;
            background: linear-gradient(
              180deg,
              var(--panel) 0%,
              var(--panel-2) 100%
            );
            border: 1px solid var(--line-soft);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            padding: 18px 14px 14px 14px;
          "
        >
          <div class="field">
            <label
              >Display Name (Please use the same name)<input
                name="displayName"
                required
            /></label>
          </div>
          <div class="field">
            <label>Server Number<input name="serverNumber" required /></label>
          </div>
          <div class="field">
            <label
              >Current Alliance Name<input name="currentAlliance" required
            /></label>
          </div>
          <div class="field">
            <label
              >Best Squad Power with optimized setup (Ex: 23.6m)<input
                name="bestSquadPower"
                required
            /></label>
          </div>
          <div class="field">
            <label
              >Total Hero Power (Ex: 105.6 million)<input
                name="totalHeroPower"
                required
            /></label>
          </div>
          <div class="field">
            <label
              >Which Alliance are you interested in joining?<input
                name="allianceInterested"
                required
            /></label>
          </div>
          <div class="field">
            <label
              >If known, what is your transfer status?
              <select name="transferStatus">
                <option value="">-- Select Status --</option>
                <option value="Gold">Gold</option>
                <option value="Purple">Purple</option>
                <option value="Blue">Blue</option>
                <option value="White">White</option>
              </select>
            </label>
          </div>
          <div class="field">
            <label
              >Additional Info you want considered?
              <textarea
                id="additionalInfo"
                name="additionalInfo"
                style="
                  min-height: 120px;
                  width: 100%;
                  resize: vertical;
                  padding: 11px 12px;
                  border: 1px solid var(--line);
                  border-radius: 10px;
                  background: #0c1825;
                  color: var(--text);
                  font-size: 0.98rem;
                  transition:
                    border-color 140ms ease,
                    box-shadow 140ms ease,
                    background-color 140ms ease;
                "
              ></textarea>
            </label>
          </div>
          <button type="submit" class="action-button">
            Submit Transfer Info
          </button>
          <div id="submitResult" style="margin-top: 14px"></div>
        </form>
      </section>
    </div>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
      import {
        getFirestore,
        doc,
        setDoc,
      } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

      function firebaseConfigOk(cfg) {
        if (!cfg || typeof cfg !== "object") return false;
        const k = String(cfg.apiKey || "");
        const pid = String(cfg.projectId || "");
        return (
          k.length > 0 &&
          k !== "YOUR_WEB_API_KEY" &&
          !k.startsWith("YOUR_") &&
          pid.length > 0 &&
          pid !== "YOUR_PROJECT_ID" &&
          !pid.startsWith("YOUR_")
        );
      }

      function firebaseConfigBannerHtml(cfg) {
        if (!cfg || typeof cfg !== "object") {
          return "<strong>Firebase config not loaded.</strong> Add <code>firebase-config.js</code> next to this page (copy from <code>firebase-config.example.js</code>). Deploy it with your real <code>apiKey</code> on your host, or paste the key locally—do not commit secrets to a public repo.";
        }
        const k = String(cfg.apiKey || "");
        const pid = String(cfg.projectId || "");
        const keyPh =
          !k || k === "YOUR_WEB_API_KEY" || k.startsWith("YOUR_");
        const pidPh =
          !pid || pid === "YOUR_PROJECT_ID" || pid.startsWith("YOUR_");
        if (keyPh && pidPh) {
          return "<strong>Firebase is not configured.</strong> Copy <code>firebase-config.example.js</code> to <code>firebase-config.js</code> and paste the full <code>firebaseConfig</code> object from Firebase Console → Project settings → Your apps → Web app.";
        }
        if (keyPh && !pidPh) {
          return "<strong>Replace <code>apiKey</code> in <code>firebase-config.js</code>.</strong> Firebase Console → Project settings → Your apps → Web app → copy <code>apiKey</code> (starts with <code>AIza</code>). Your project fields are set; only the key is still a placeholder.";
        }
        if (pidPh) {
          return "<strong>Replace placeholder project fields in <code>firebase-config.js</code></strong> with the full web app object from Firebase Console.";
        }
        return "<strong>Firebase did not initialize.</strong> Check the browser console.";
      }

      try {
        const firebaseConfig = window.__FIREBASE_CONFIG__;
        if (firebaseConfigOk(firebaseConfig)) {
          const app = initializeApp(firebaseConfig);
          const db = getFirestore(app);
          window._firebaseDb = db;
          window._firebaseDoc = doc;
          window._firebaseSetDoc = setDoc;
        } else {
          window._firebaseInitFailed = true;
          const banner = document.getElementById("firebaseConfigBanner");
          if (banner) {
            banner.style.display = "block";
            banner.innerHTML = firebaseConfigBannerHtml(firebaseConfig);
          }
        }
      } catch (e) {
        console.error(e);
        window._firebaseInitFailed = true;
      }
    </script>
    <script>
      window._firebaseInitFailed = window._firebaseInitFailed || false;
      // Get the unique id from the URL
      function getId() {
        const params = new URLSearchParams(window.location.search);
        return params.get("id");
      }
      document
        .getElementById("transferSubmitForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();
          const id = getId();
          if (!id) {
            document.getElementById("submitResult").textContent =
              "Invalid or missing link ID.";
            return;
          }
          const data = {
            displayName: this.displayName.value,
            serverNumber: this.serverNumber.value,
            currentAlliance: this.currentAlliance.value,
            bestSquadPower: this.bestSquadPower.value,
            totalHeroPower: this.totalHeroPower.value,
            allianceInterested: this.allianceInterested.value,
            transferStatus: this.transferStatus.value,
            submittedAt: new Date().toISOString(),
            linkId: id,
            additionalInfo: this.additionalInfo.value,
            confirmed: false,
          };
          try {
            if (window._firebaseInitFailed) {
              document.getElementById("submitResult").innerHTML =
                '<span style="color:var(--warn);"><strong>Cannot submit.</strong> Firebase is not configured. Copy <code>firebase-config.example.js</code> to <code>firebase-config.js</code> and add your web app config (see the notice above).</span>';
              return;
            }
            let attempts = 0;
            const waitForFirebase = () =>
              new Promise((resolve, reject) => {
                if (window._firebaseInitFailed) {
                  reject(new Error("Firebase not configured"));
                  return;
                }
                if (
                  window._firebaseDb &&
                  window._firebaseDoc &&
                  window._firebaseSetDoc
                ) {
                  resolve();
                  return;
                }
                attempts += 1;
                if (attempts > 200) {
                  reject(new Error("Firebase load timeout"));
                  return;
                }
                setTimeout(() => resolve(waitForFirebase()), 50);
              });
            await waitForFirebase();
            const db = window._firebaseDb;
            const docFn = window._firebaseDoc;
            const setDocFn = window._firebaseSetDoc;
            await setDocFn(docFn(db, "transferSubmissions", id), data);
            localStorage.setItem(
              "transferSubmission_" + id,
              JSON.stringify(data),
            );
            document.getElementById("submitResult").innerHTML =
              '<span style="color:var(--ok);font-weight:700;">Thank you! Your info has been submitted and will appear in the tracker.</span>';
            this.reset();
          } catch (err) {
            document.getElementById("submitResult").innerHTML =
              '<span style="color:var(--warn);font-weight:700;">Error submitting info. Please try again later.</span>';
          }
        });
    </script>
  </body>
</html>
