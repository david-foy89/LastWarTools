name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Requires repo secret FIREBASE_CONFIG_JSON (see firebase-config.example.js).
      - name: Generate firebase-config.js from secret
        env:
          FIREBASE_CONFIG_JSON: ${{ secrets.FIREBASE_CONFIG_JSON }}
          FIREBASE_APPCHECK_SITE_KEY: ${{ secrets.FIREBASE_APPCHECK_SITE_KEY }}
          FIREBASE_APPCHECK_DEBUG_TOKEN: ${{ secrets.FIREBASE_APPCHECK_DEBUG_TOKEN }}
        run: |
          node -e "
          const fs = require('fs');
          const raw = process.env.FIREBASE_CONFIG_JSON || '';
          if (!raw.trim()) {
            console.error('Missing secret FIREBASE_CONFIG_JSON');
            process.exit(1);
          }
          let cfg;
          try { cfg = JSON.parse(raw); } catch (e) {
            console.error('FIREBASE_CONFIG_JSON must be valid JSON');
            process.exit(1);
          }
          if (!cfg.databaseURL && cfg.projectId && typeof cfg.projectId === 'string' && !/^YOUR_/i.test(cfg.projectId)) {
            cfg.databaseURL = 'https://' + cfg.projectId + '-default-rtdb.firebaseio.com';
          }
          let out = 'window.__FIREBASE_CONFIG__ = ' + JSON.stringify(cfg, null, 2) + ';\n';
          const apk = (process.env.FIREBASE_APPCHECK_SITE_KEY || '').trim();
          if (apk) {
            out += 'window.__FIREBASE_APPCHECK_SITE_KEY__ = ' + JSON.stringify(apk) + ';\n';
          }
          const dbg = (process.env.FIREBASE_APPCHECK_DEBUG_TOKEN || '').trim();
          if (dbg) {
            out += 'window.__FIREBASE_APPCHECK_DEBUG_TOKEN__ = ' + JSON.stringify(dbg) + ';\n';
          }
          fs.writeFileSync('firebase-config.js', out);
          console.log('Wrote firebase-config.js' + (apk ? ' (with App Check site key)' : ''));
          "

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
