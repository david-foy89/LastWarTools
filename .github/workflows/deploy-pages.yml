name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  # Let an in-flight production deploy finish; GitHub Pages starter uses false for the same reason.
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Repository secret name must be exactly: FIREBASE_CONFIG_JSON (Settings → Secrets → Actions).
      # Value = strict JSON only: double quotes, no trailing commas, no JS comments (minify to one line).
      - name: Generate firebase-config.js from secret
        env:
          FIREBASE_CONFIG_JSON: ${{ secrets.FIREBASE_CONFIG_JSON }}
          FIREBASE_APPCHECK_SITE_KEY: ${{ secrets.FIREBASE_APPCHECK_SITE_KEY }}
          FIREBASE_APPCHECK_DEBUG_TOKEN: ${{ secrets.FIREBASE_APPCHECK_DEBUG_TOKEN }}
        run: |
          node <<'NODE_SCRIPT'
          const fs = require("fs");
          let raw = String(process.env.FIREBASE_CONFIG_JSON || "");
          raw = raw.replace(/^\uFEFF/, "").trim();
          if (!raw) {
            console.error(
              "Missing or empty secret FIREBASE_CONFIG_JSON. Add it under Settings → Secrets and variables → Actions.",
            );
            process.exit(1);
          }
          let cfg;
          try {
            cfg = JSON.parse(raw);
          } catch (e) {
            console.error("FIREBASE_CONFIG_JSON is not valid JSON:", e.message);
            console.error(
              "Fix: paste a single JSON object from Firebase Console → Project settings → Your apps → config. Use double quotes, no trailing commas. Not a JavaScript object literal.",
            );
            process.exit(1);
          }
          if (!cfg || typeof cfg !== "object" || Array.isArray(cfg)) {
            console.error("FIREBASE_CONFIG_JSON must be a JSON object { ... }, not a string or array.");
            process.exit(1);
          }
          if (
            !cfg.databaseURL &&
            cfg.projectId &&
            typeof cfg.projectId === "string" &&
            !/^YOUR_/i.test(cfg.projectId)
          ) {
            cfg.databaseURL =
              "https://" + cfg.projectId + "-default-rtdb.firebaseio.com";
          }
          let out =
            "window.__FIREBASE_CONFIG__ = " + JSON.stringify(cfg, null, 2) + ";\n";
          const apk = (process.env.FIREBASE_APPCHECK_SITE_KEY || "").trim();
          if (apk) {
            const badJson =
              apk.length > 120 ||
              /[{[]|"apiKey"\s*:|"projectId"\s*:|"databaseURL"\s*:/i.test(apk);
            const okKey = /^6L[a-zA-Z0-9_-]{20,}$/.test(apk) && !badJson;
            if (!okKey) {
              console.error(
                "FIREBASE_APPCHECK_SITE_KEY must be the reCAPTCHA Enterprise site key only (short string starting with 6L from Firebase → App Check). It looks like the Firebase web config JSON was pasted — fix the repository secret.",
              );
              process.exit(1);
            }
            out +=
              "window.__FIREBASE_APPCHECK_SITE_KEY__ = " +
              JSON.stringify(apk) +
              ";\n";
          }
          const dbg = (process.env.FIREBASE_APPCHECK_DEBUG_TOKEN || "").trim();
          if (dbg) {
            out +=
              "window.__FIREBASE_APPCHECK_DEBUG_TOKEN__ = " +
              JSON.stringify(dbg) +
              ";\n";
          }
          fs.writeFileSync("firebase-config.js", out);
          console.log(
            "Wrote firebase-config.js" + (apk ? " (with App Check site key)" : ""),
          );
          NODE_SCRIPT

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .
          # v4 excludes dotfiles by default; include .nojekyll and any .well-known assets.
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
